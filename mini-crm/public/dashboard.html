<!DOCTYPE html>
<html>
<head>
    <title>Mini CRM Dashboard</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
<div class="top-bar">
    <h2>Mini CRM Dashboard</h2>
    <button onclick="logout()">Logout</button>
</div>
<div class="stats">
    <div class="card">New: <span id="newCount">0</span></div>
    <div class="card">Contacted: <span id="contactedCount">0</span></div>
    <div class="card">Converted: <span id="convertedCount">0</span></div>
</div>
<div class="form-box">
    <h3>Add Customer</h3>
    <input id="name" placeholder="Name">
    <input id="email" placeholder="Email">
    <input id="phone" placeholder="Phone">
    <input id="followUp" placeholder="Follow Up">
    <select id="status">
        <option value="new">New</option>
        <option value="contacted">Contacted</option>
        <option value="converted">Converted</option>
    </select>
    <button onclick="addLead()"> + Add Customer</button>
</div>
<table>
    <thead>
        <tr>
            <th>Name</th>
            <th>Phone</th>
            <th>Email</th>
            <th>Status</th>
            <th>Follow Up</th>
        </tr>
    </thead>
    <tbody id="tableBody"></tbody>
</table>
<script src="script.js"></script>
</body>
</html>
